<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бүтээгдэхүүний дэлгэрэнгүй</title>
  <link rel="stylesheet" href="product-pages.css?v=20260410-2">
</head>
<body>
  <main class="page-wrap">
    <header class="page-header">
      <div class="header-tools">
        <a id="back-to-category" href="index.html" class="back-link">← Буцах</a>
        <button id="page-lang-toggle" class="lang-toggle-page" type="button" aria-label="Switch language">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path d="M12 2c5.5 0 10 4.5 10 10s-4.5 10-10 10S2 17.5 2 12 6.5 2 12 2zm6.9 9h-3.2a15.5 15.5 0 0 0-1.6-5.8A8.1 8.1 0 0 1 18.9 11zM12 4.1c.8 1.2 1.7 3.5 2.1 6.9H9.9c.4-3.4 1.3-5.7 2.1-6.9zM4.1 13h3.2c.1 2.1.7 4 1.6 5.8A8.1 8.1 0 0 1 4.1 13zm3.2-2H4.1a8.1 8.1 0 0 1 4.8-5.8A15.5 15.5 0 0 0 7.3 11zm1.9 2h5.6c-.4 3.4-1.3 5.7-2.1 6.9-.8-1.2-1.7-3.5-2.1-6.9zm6.5 5.8c.9-1.8 1.5-3.7 1.6-5.8h3.2a8.1 8.1 0 0 1-4.8 5.8z"/>
          </svg>
          <span id="page-lang-label">EN</span>
        </button>
      </div>
      <h1 id="detail-title">Бүтээгдэхүүн</h1>
    </header>

    <section id="showcase-layout" class="showcase-layout hidden">
      <div class="showcase-gallery">
        <div class="showcase-main-wrap">
          <button id="gallery-prev" class="gallery-nav prev" type="button" aria-label="Өмнөх зураг">‹</button>
          <img id="showcase-main-image" class="showcase-main-image" src="images/Carnumber.png" alt="Бүтээгдэхүүний зураг">
          <button id="gallery-next" class="gallery-nav next" type="button" aria-label="Дараагийн зураг">›</button>
        </div>
        <div id="showcase-thumbs" class="showcase-thumbs"></div>
      </div>

      <aside class="showcase-info">
        <h2 id="showcase-product-name" class="showcase-product-name"></h2>
        <p id="showcase-price" class="showcase-price"></p>

        <div id="showcase-sizes-wrap" class="showcase-meta-wrap hidden">
          <span class="showcase-meta-label" id="showcase-size-label">Хэмжээ:</span>
          <div id="showcase-sizes" class="size-options"></div>
        </div>

        <div id="showcase-colors-wrap" class="showcase-meta-wrap hidden">
          <span class="showcase-meta-label" id="showcase-color-label">Өнгө:</span>
          <div id="showcase-colors" class="color-options"></div>
        </div>

        <div id="showcase-patterns-wrap" class="showcase-meta-wrap hidden">
          <span class="showcase-meta-label" id="showcase-pattern-label">Хээ:</span>
          <div id="showcase-patterns" class="color-options"></div>
        </div>

        <ul id="showcase-bullets" class="showcase-bullets"></ul>

      </aside>
    </section>

    <section id="detail-card" class="detail-card">
      <div class="detail-media">
        <img id="detail-image" src="images/nehii-olbog.jpg" alt="Бүтээгдэхүүний зураг">
      </div>
      <div class="detail-content">
        <h2 id="detail-name">Нэр</h2>
        <p id="detail-description">Тайлбар</p>
      </div>
    </section>
  </main>

  <script src="product-data.js?v=20260423-1"></script>
  <script src="product-detail.js?v=20260425-1"></script>
</body>
</html>
